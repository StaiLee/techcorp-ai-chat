name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
      - name: Vet
        working-directory: gateway
        run: go vet ./...
      - name: Build
        working-directory: gateway
        run: go build -o gateway .
      - name: Test
        working-directory: gateway
        run: go test ./... -v

  web:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Type-check & build
        working-directory: web
        run: npm run build

  quality:
    name: Security & Data (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Production integrity gate (must be grade A)
        run: python security/integrity_audit.py --root .
      - name: Backdoor forensics on inherited evidence
        # Exits non-zero by design when poison is present — expected here.
        run: python security/backdoor_forensics.py || true
